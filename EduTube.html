<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduTube — শিক্ষার আলো</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c14;
      --bg2: #0e1420;
      --surface: #131b2a;
      --surface2: #1a2438;
      --accent: #f0c040;
      --accent2: #ff6b35;
      --accent3: #3df5c1;
      --text: #e8eaf0;
      --text2: #8a93a8;
      --glow: rgba(240,192,64,0.18);
      --glow2: rgba(61,245,193,0.10);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated BG ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(240,192,64,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(61,245,193,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 60% 30%, rgba(255,107,53,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(240,192,64,0.15);
      padding: 0 clamp(16px,4vw,60px);
      height: 68px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(240,192,64,0.4);
      animation: pulse-logo 3s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%,100% { box-shadow: 0 0 20px rgba(240,192,64,0.4); }
      50%      { box-shadow: 0 0 35px rgba(240,192,64,0.7); }
    }
    .logo-text {
      font-family: 'Exo 2', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }
    .logo-text span:first-child { color: var(--accent); }
    .logo-text span:last-child  { color: var(--text); }

    .header-right {
      display: flex; align-items: center; gap: 12px;
    }
    .tag-pill {
      background: rgba(61,245,193,0.1);
      border: 1px solid rgba(61,245,193,0.3);
      color: var(--accent3);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    #video-count {
      font-size: 0.85rem;
      color: var(--text2);
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: clamp(40px,8vw,80px) clamp(16px,4vw,60px) clamp(30px,5vw,50px);
    }
    .hero-eyebrow {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent3);
      margin-bottom: 16px;
      opacity: 0;
      animation: fade-up 0.6s 0.2s forwards;
    }
    .hero h1 {
      font-family: 'Exo 2', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 1.1;
      margin-bottom: 16px;
      opacity: 0;
      animation: fade-up 0.6s 0.4s forwards;
    }
    .hero h1 .highlight {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      color: var(--text2);
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      max-width: 500px;
      margin: 0 auto;
      opacity: 0;
      animation: fade-up 0.6s 0.6s forwards;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── GRID ── */
    .grid-wrap {
      position: relative; z-index: 1;
      padding: 0 clamp(16px,4vw,60px) 80px;
    }

    .section-label {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text2);
    }
    .section-label::before, .section-label::after {
      content: ''; flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    #video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%,200px), 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .video-card {
      background: var(--surface);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(.2,.8,.3,1), border-color 0.3s, box-shadow 0.3s;
      opacity: 0;
      animation: card-in 0.5s forwards;
      position: relative;
    }
    .video-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(240,192,64,0.35);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--glow);
    }
    @keyframes card-in {
      from { opacity:0; transform: translateY(20px) scale(0.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* 9:16 thumbnail */
    .thumb-wrap {
      position: relative;
      aspect-ratio: 9/16;
      background: var(--surface2);
      overflow: hidden;
    }
    .thumb-wrap video {
      width:100%; height:100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .video-card:hover .thumb-wrap video {
      transform: scale(1.05);
    }

    .play-overlay {
      position: absolute; inset:0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .video-card:hover .play-overlay { opacity: 1; }

    .play-btn {
      width: 52px; height: 52px;
      background: rgba(240,192,64,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(240,192,64,0.5);
      transform: scale(0.8);
      transition: transform 0.3s;
    }
    .video-card:hover .play-btn { transform: scale(1); }
    .play-btn svg { fill: #111; margin-left: 4px; }

    .card-num {
      position: absolute; top: 8px; right: 10px;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      padding: 2px 8px; border-radius: 6px;
      color: var(--accent);
      border: 1px solid rgba(240,192,64,0.2);
    }

    .card-body {
      padding: 12px 14px 14px;
    }
    .card-title {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .card-meta {
      font-size: 0.7rem;
      color: var(--text2);
      display: flex; align-items: center; gap: 6px;
    }
    .card-meta .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* ── LOADER ── */
    #loader {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px;
      gap: 20px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(240,192,64,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { color: var(--text2); font-size: 0.9rem; }

    /* ── EMPTY STATE ── */
    #empty {
      display: none;
      text-align: center; padding: 80px 20px;
    }
    #empty .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    #empty p { color: var(--text2); }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(4,6,10,0.97);
      backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    .lb-close {
      position: absolute; top: 18px; right: 22px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 10;
    }
    .lb-close:hover { background: rgba(240,192,64,0.2); transform: scale(1.1); }

    .lb-video-wrap {
      position: relative;
      width: min(90vw, calc(100vh * 9/16));
      max-height: 95vh;
      aspect-ratio: 9/16;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(240,192,64,0.12);
      animation: lb-in 0.35s cubic-bezier(.2,.8,.3,1);
    }
    @keyframes lb-in {
      from { opacity:0; transform: scale(0.88); }
      to   { opacity:1; transform: scale(1); }
    }
    #lb-video {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .lb-info {
      margin-top: 16px;
      text-align: center;
      max-width: 360px;
    }
    .lb-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .lb-sub {
      font-size: 0.75rem;
      color: var(--text2);
    }

    /* nav arrows */
    .lb-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }
    .lb-arrow:hover { background: rgba(240,192,64,0.2); }
    #lb-prev { left: clamp(8px, 2vw, 24px); }
    #lb-next { right: clamp(8px, 2vw, 24px); }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 28px;
      border-top: 1px solid rgba(255,255,255,0.05);
      color: var(--text2);
      font-size: 0.8rem;
    }
    footer span { color: var(--accent); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      #video-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .lb-arrow { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">
      <span>Edu</span><span>Tube</span>
    </div>
  </a>
  <div class="header-right">
    <span class="tag-pill">LIVE</span>
    <span id="video-count">লোড হচ্ছে...</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">✦ শিক্ষার আলো ছড়িয়ে দাও ✦</div>
  <h1>শব্দ ও ছবি দিয়ে <br><span class="highlight">শিল্প তৈরি করো</span></h1>
  <p>EduTube-এ স্বাগতম — যেখানে জ্ঞান ও সৌন্দর্য একসাথে মেলে।</p>
</section>

<!-- GRID -->
<div class="grid-wrap">
  <div class="section-label">সকল ভিডিও</div>
  <div id="loader">
    <div class="spinner"></div>
    <p>ভিডিও লোড হচ্ছে...</p>
  </div>
  <div id="empty">
    <div class="empty-icon">📭</div>
    <p>কোনো ভিডিও পাওয়া যায়নি।</p>
  </div>
  <div id="video-grid"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-arrow" id="lb-prev" onclick="changeVideo(-1)">‹</button>
  <div class="lb-video-wrap">
    <video id="lb-video" controls autoplay playsinline></video>
  </div>
  <button class="lb-arrow" id="lb-next" onclick="changeVideo(1)">›</button>
  <div class="lb-info">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-sub" id="lb-sub"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  তৈরি করেছেন <span>economist-bd</span> · EduTube © 2025
</footer>

<script>
  // ──────────────────────────────────────────
  //  CONFIG — শুধু এই দুটি লাইন পরিবর্তন করুন
  // ──────────────────────────────────────────
  const GITHUB_USER = 'economist-bd';
  const GITHUB_REPO = 'EduTube';
  const GITHUB_BRANCH = 'main';
  // ──────────────────────────────────────────

  const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/git/trees/${GITHUB_BRANCH}?recursive=1`;
  const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/`;

  const VIDEO_EXTS = ['.mp4','.webm','.ogg','.mov','.mkv','.m4v','.avi'];

  let videos = [];
  let currentIdx = 0;

  async function fetchVideos() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
      const data = await res.json();
      const files = data.tree || [];
      videos = files
        .filter(f => f.type === 'blob' && VIDEO_EXTS.some(e => f.path.toLowerCase().endsWith(e)))
        .map(f => ({
          path: f.path,
          url: RAW_BASE + encodeURIComponent(f.path).replace(/%2F/g, '/'),
          name: f.path.split('/').pop().replace(/\.[^.]+$/, '').replace(/[-_]/g,' ')
        }));
      return videos;
    } catch(e) {
      console.error(e);
      return [];
    }
  }

  function cleanName(name) {
    // Remove UUID-like prefixes (grok-video-XXXX...)
    return name.replace(/^grok[-_]video[-_][a-f0-9-]+\s*/i, 'ভিডিও ').trim() || 'EduTube ভিডিও';
  }

  function renderGrid(vids) {
    const grid = document.getElementById('video-grid');
    grid.innerHTML = '';
    vids.forEach((v, i) => {
      const delay = Math.min(i * 60, 800);
      const title = cleanName(v.name);
      const card = document.createElement('div');
      card.className = 'video-card';
      card.style.animationDelay = delay + 'ms';
      card.innerHTML = `
        <div class="thumb-wrap">
          <video src="${v.url}#t=1" preload="metadata" muted loop playsinline></video>
          <div class="play-overlay">
            <div class="play-btn">
              <svg width="18" height="18" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
          </div>
          <div class="card-num">#${String(i+1).padStart(2,'0')}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${title}</div>
          <div class="card-meta">
            <span class="dot"></span>
            <span>9:16 · HD</span>
          </div>
        </div>
      `;
      // hover preview
      const vid = card.querySelector('video');
      card.addEventListener('mouseenter', () => { vid.play().catch(()=>{}); });
      card.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
      card.addEventListener('click', () => openLightbox(i));
      grid.appendChild(card);
    });
  }

  function openLightbox(idx) {
    currentIdx = idx;
    const v = videos[idx];
    const lbVid = document.getElementById('lb-video');
    lbVid.src = v.url;
    lbVid.play().catch(()=>{});
    document.getElementById('lb-title').textContent = cleanName(v.name);
    document.getElementById('lb-sub').textContent = `ভিডিও ${idx+1} / ${videos.length}`;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('open');
    const lbVid = document.getElementById('lb-video');
    lbVid.pause();
    lbVid.src = '';
    document.body.style.overflow = '';
  }

  function changeVideo(dir) {
    currentIdx = (currentIdx + dir + videos.length) % videos.length;
    openLightbox(currentIdx);
  }

  // keyboard nav
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') changeVideo(1);
    if (e.key === 'ArrowLeft') changeVideo(-1);
  });

  // click outside video to close
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // ── INIT ──
  (async () => {
    const vids = await fetchVideos();
    document.getElementById('loader').style.display = 'none';
    if (vids.length === 0) {
      document.getElementById('empty').style.display = 'block';
      document.getElementById('video-count').textContent = '০ টি ভিডিও';
    } else {
      document.getElementById('video-count').textContent = `${vids.length} টি ভিডিও`;
      renderGrid(vids);
    }
  })();
</script>
</body>
</html>
